<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="url(#glow)" stroke-width="1"/>
  
  <!-- Neural network nodes - representing AI -->
  <circle cx="8" cy="8" r="1.5" fill="#00d4ff" filter="url(#neon)"/>
  <circle cx="24" cy="8" r="1.5" fill="#7c3aed" filter="url(#neon)"/>
  <circle cx="8" cy="24" r="1.5" fill="#f472b6" filter="url(#neon)"/>
  <circle cx="24" cy="24" r="1.5" fill="#00d4ff" filter="url(#neon)"/>
  <circle cx="16" cy="6" r="1" fill="#00d4ff" opacity="0.7"/>
  <circle cx="16" cy="26" r="1" fill="#f472b6" opacity="0.7"/>
  
  <!-- Neural connections -->
  <line x1="8" y1="8" x2="16" y2="16" stroke="url(#glow)" stroke-width="0.5" opacity="0.6"/>
  <line x1="24" y1="8" x2="16" y2="16" stroke="url(#glow)" stroke-width="0.5" opacity="0.6"/>
  <line x1="8" y1="24" x2="16" y2="16" stroke="url(#glow)" stroke-width="0.5" opacity="0.6"/>
  <line x1="24" y1="24" x2="16" y2="16" stroke="url(#glow)" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Central brain/AI core -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="url(#glow)" stroke-width="1.5" filter="url(#neon)"/>
  <circle cx="16" cy="16" r="3" fill="url(#glow)" opacity="0.8"/>
  
  <!-- Stylized "A" integrated into design -->
  <path d="M13 20 L16 12 L19 20 M14 17.5 H18" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>